name: Deploy to Production

on:
  push:
    branches: [ main, master ]  # при пуше в main
  workflow_dispatch:              # можно запустить вручную

jobs:
  deploy:
    name: Deploy to Yandex Cloud VM
    runs-on: ubuntu-latest
    
    steps:
      # 1. Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Настраиваем SSH-ключ для доступа к серверу
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 3. Добавляем сервер в known_hosts
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      # 4. Копируем файлы на сервер (только изменённые)
      - name: Fix permissions before sync
        run: |
          ssh ubuntu@${{ secrets.SERVER_IP }} "
            sudo chown -R ubuntu:ubuntu /opt/pet-project 2>/dev/null || true
            sudo chmod -R 755 /opt/pet-project 2>/dev/null || true
            echo '✅ Permissions fixed'
          "

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'secrets/' \
            --exclude 'init/' `# временно исключим проблемную папку` \
            ./ ubuntu@${{ secrets.SERVER_IP }}:/opt/pet-project/

      # 5. Копируем секреты отдельно (если они есть в репозитории)
      - name: Create secrets directory and files
        run: |
          ssh ubuntu@${{ secrets.SERVER_IP }} "
            # Создаём структуру папок с правильными правами
            sudo mkdir -p /opt/pet-project/secrets
            sudo chown -R ubuntu:ubuntu /opt/pet-project
            sudo chmod 755 /opt/pet-project/secrets
            
            # Создаём файлы с секретами
            echo '${{ secrets.DB_PASSWORD }}' > /opt/pet-project/secrets/db_password.txt
            echo '${{ secrets.REDIS_PASSWORD }}' > /opt/pet-project/secrets/redis_password.txt
            
            # Устанавливаем правильные права (только чтение для владельца)
            chmod 0400 /opt/pet-project/secrets/*.txt
            
            # Проверяем результат
            echo '=== Secrets directory ==='
            ls -la /opt/pet-project/secrets/
            echo '✅ Secrets created successfully'
          "

      # 6. Деплой на сервере
        - name: Deploy containers
        run: |
          ssh ubuntu@${{ secrets.SERVER_IP }} "
            cd /opt/pet-project && \
            docker compose down && \
            docker compose up -d --build && \
            echo '✅ Деплой завершён'
          "

      # 7. Проверка работоспособности
        - name: Health checks
        run: |
          ssh ubuntu@${{ secrets.SERVER_IP }} "
            # Проверка 1: через Docker (внутри контейнера)
            docker exec pet-backend curl -f http://localhost:8000/api/health && echo '✅ Backend OK' || exit 1
            
            # Проверка 2: через фронтенд (публичный API)
            curl -f http://${{ secrets.SERVER_IP }}/api/health && echo '✅ API через frontend OK' || exit 1
          "

      # 8. Уведомление об успехе
      - name: Success notification
        if: success()
        run: |
          echo "🎉 Деплой успешно завершён!"
          echo "🌐 Сайт: http://${{ secrets.SERVER_IP }}"
          echo "📊 Grafana: http://${{ secrets.SERVER_IP }}:3000"
          echo "📈 Prometheus: http://${{ secrets.SERVER_IP }}:9090"

      # 9. Уведомление об ошибке
      - name: Failure notification
        if: failure()
        run: |
          echo "❌ Деплой не удался!"
          echo "Проверьте логи на сервере:"
          echo "ssh ubuntu@${{ secrets.SERVER_IP }} 'cd /opt/pet-project && docker compose logs'"
