

networks:
  frontend:
    name: frontend-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  
  backend:
    name: backend-network
    driver: bridge
    internal: true  # 🔐 КЛЮЧЕВОЙ МОМЕНТ - ПОЛНАЯ ИЗОЛЯЦИЯ!
    ipam:
      config:
        - subnet: 172.21.0.0/24

volumes:
  postgres_data:
    name: pet-postgres-data
  redis_data:
    name: pet-redis-data
  prometheus_data:
    name: pet-prometheus-data
  grafana_data:
    name: pet-grafana-data
  loki_data:
    driver: local  

secrets:
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt

services:
  # 1. База данных - ПОЛНАЯ ИЗОЛЯЦИЯ
  postgres:
    image: postgres:15-alpine
    container_name: pet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    # ❌ НЕТ портов, опубликованных на хост
    # ❌ НЕТ доступа в интернет (internal: true)

  # 2. Кэш - ПОЛНАЯ ИЗОЛЯЦИЯ
  redis:
    image: redis:7-alpine
    container_name: pet-redis
    restart: unless-stopped
    command: >
      redis-server 
      --appendonly yes 
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    # ❌ НЕТ портов на хост

  # 3. Бэкенд - ВИДИТ БД и КЭШ
  backend:
    build: ./backend
    container_name: pet-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_ENV: ${APP_ENV}
      APP_SECRET: ${APP_SECRET}
    secrets:
      - db_password
      - redis_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    # ❌ НЕТ портов на хост

  # 4. Фронтенд - ЕДИНСТВЕННЫЙ С ДОСТУПОМ ИЗВНЕ
  frontend:
    build: ./frontend
    container_name: pet-frontend
    restart: unless-stopped
    ports:
      - "80:80"  # ЕДИНСТВЕННЫЙ ОТКРЫТЫЙ ПОРТ!
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    # ❌ НЕТ доступа к backend сети

  # 5. Мониторинг (опционально) - в отдельных сетях
  prometheus:
    image: prom/prometheus:latest
    container_name: pet-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - backend
      - frontend
    ports:
      - "9090:9090"  # Для отладки
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: pet-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
    networks:
      - frontend
    ports:
      - "3000:3000"  # Для отладки
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M

# Добавьте в ваш существующий docker-compose.yml

  # Метрики сервера
  node-exporter:
    image: prom/node-exporter:latest
    container_name: pet-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - backend
    ports:
      - "9100:9100"  # Для отладки
    deploy:
      resources:
        limits:
          memory: 128M

  # Метрики Docker-контейнеров
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: pet-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - backend
    ports:
      - "8080:8080"  # Для отладки
    deploy:
      resources:
        limits:
          memory: 128M

  # Система логирования Loki
  loki:
    image: grafana/loki:latest
    container_name: pet-loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend
    ports:
      - "3100:3100"  # API для сбора логов
    deploy:
      resources:
        limits:
          memory: 256M

  # Агент сбора логов
  promtail:
    image: grafana/promtail:latest
    container_name: pet-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 64M

  # Добавьте новые volumes
 alertmanager:
  image: prom/alertmanager:latest
  container_name: pet-alertmanager
  restart: unless-stopped
  volumes:
    - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    - alertmanager_data:/alertmanager
  command:
    - '--config.file=/etc/alertmanager/alertmanager.yml'
    - '--storage.path=/alertmanager'
  networks:
    - backend
    - frontend
  ports:
    - "9093:9093"
  deploy:
    resources:
      limits:
        memory: 128M